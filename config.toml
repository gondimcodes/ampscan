# AmpScan PDF Report Configuration

[company]
# Name of the company generating the report
name = "XXXXXXXX XXXXXXXX X XXXXXXXXXX"

# Company Registration Number (e.g., CNPJ, EIN, VAT)
cnpj = "XX.XXX.XXX/XXXX-XX"

# Address of the issuing company
address = "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

# Path to the logo image (PNG or JPEG).
# If not configured or the file does not exist, a default text header will be drawn.
logo_path = ""

# Logo scale/size in the PDF (e.g., 0.15 is default, higher values like 0.25 increase the image)
logo_scale = 0.50
